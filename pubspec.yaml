name: asset_shield
description: "A new Flutter plugin project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  path: ^1.9.0
  pointycastle: ^3.9.1
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0

executables:
  asset_shield: asset_shield

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
