name: asset_shield
description: "Native asset encryption and compression for Flutter."
version: 0.1.5
homepage: https://github.com/XiaoNaoWeiSuo/asset_shield
repository: https://github.com/XiaoNaoWeiSuo/asset_shield.git
issue_tracker: https://github.com/XiaoNaoWeiSuo/asset_shield/issues

environment:
  sdk: ^3.0.0
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  path: ^1.9.0
  crypto: ^3.0.3
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0

executables:
  asset_shield: asset_shield

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.asset_shield
        pluginClass: AssetShieldPlugin
      ios:
        pluginClass: AssetShieldPlugin
      macos:
        pluginClass: AssetShieldPlugin
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
